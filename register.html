<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
    <h1>Регистрация</h1>
    
    <form onsubmit="event.preventDefault(); sendDataRegistration();">
        <div>
            <label>Имя:</label>
            <input type="text" id="name" required>
        </div>
        <br>
        <div>
            <label>Логин (мин. 3 символа):</label>
            <input type="text" id="log" required minlength="3">
        </div>
        <br>
        <div>
            <label>Пароль (мин. 6 символов):</label>
            <input type="password" id="pass1" required minlength="6">
        </div>
        <br>
        <div>
            <label>Подтверждение пароля:</label>
            <input type="password" id="pass2" required minlength="6">
        </div>
        <br>
        <button type="submit">Зарегистрироваться</button>
    </form>
    
    <div>
        <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
    
    <script src="js/register.js"></script>
</body>
</html>
