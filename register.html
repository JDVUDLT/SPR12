<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">SprintPlanner</a>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/login">Вход</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Регистрация</h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя:</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-group">
                    <label>Логин (мин. 3 символа):</label>
                    <input type="text" id="log" required minlength="3">
                </div>
                
                <div class="form-group">
                    <label>Email (необязательно):</label>
                    <input type="email" id="email">
                </div>
                
                <div class="form-group">
                    <label>Пароль (мин. 6 символов):</label>
                    <input type="password" id="pass1" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label>Подтверждение пароля:</label>
                    <input type="password" id="pass2" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
            </form>
            
            <div id="message" class="message"></div>
            
            <p class="text-center">
                Уже есть аккаунт? <a href="/login">Войти</a>
            </p>
        </div>
    </div>

    <!-- Подключаем JavaScript в правильном порядке -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/register.js"></script>
</body>
</html>
