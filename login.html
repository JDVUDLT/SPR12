<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .register-link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Вход в систему</h1>
    
    <form onsubmit="event.preventDefault(); sendData();">

            <label for="log">Логин:</label>
            <input type="text" id="log" required minlength="3" 
                   placeholder="Введите логин">

        <div class="form-group">
            <label for="pass1">Пароль:</label>
            <input type="password" id="pass1" required 
                   placeholder="Введите пароль">
        </div>
        
        <button type="submit">Войти</button>
    </form>
    
    <div class="register-link">
        Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
    </div>

</body>
</html>
