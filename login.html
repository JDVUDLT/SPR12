<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - SprintPlanner</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">SprintPlanner</a>
            <div class="nav-links">
                <a href="/">Главная</a>
                <a href="/login" class="active">Вход</a>
                <a href="/register">Регистрация</a>
            </div>
        </div>
    </nav>

    <!-- Форма входа -->
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔐 Вход в систему</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="log">Логин:</label>
                    <input type="text" id="log" name="log" required placeholder="Введите логин">
                </div>
                
                <div class="form-group">
                    <label for="pass1">Пароль:</label>
                    <input type="password" id="pass1" name="pass" required placeholder="Введите пароль">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
            
            <div id="message" class="message"></div>
            
            <p class="text-center" style="margin-top: 20px;">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            </p>
            
        </div>
    </div>

    <!-- Подключаем скрипты в правильном порядке -->
    <script src="/js/api.js"></script>
    <script src="/js/authService.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
